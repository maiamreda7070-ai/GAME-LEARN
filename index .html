
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقعي التعليمي</title>
    <style>
        /* كود التنسيق CSS */
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
            background-color: #f4f4f9;
        }
        h1 {
            color: #333;
        }
        button {
            padding: 12px 24px;
            margin: 8px;
            border: none;
            background-color: #4CAF50;
            color: white;
            font-size: 18px;
            cursor: pointer;
            border-radius: 5px;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #45a049;
        }
    </style>
</head>

<body>

    <h1>موقعي التعليمي</h1>

    <button onclick="startGame()">ابدأ اللعبة</button>

    <script>
        // كود التفاعل والتشفيل JavaScript
        function startGame() {
            alert("استعد! ستبدأ اللعبة قريباً.");
        }
    </script>

</body>
</html>
